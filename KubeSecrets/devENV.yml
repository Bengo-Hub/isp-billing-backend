# =============================================================================
# ISP Billing — Kubernetes Secrets for Local / Manual Deployment
# Namespace: isp-billing
# =============================================================================
# IMPORTANT: Do NOT commit real credentials to version control.
# Replace all placeholder values before applying.
#
# Usage:
#   kubectl apply -n isp-billing -f KubeSecrets/devENV.yml
#
# This file is auto-applied by build.sh when running outside CI.
# In CI/CD, secrets are created by devops-k8s/scripts/infrastructure/create-service-secrets.sh
# =============================================================================

---
# =============================================================================
# Backend API Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: isp-billing-backend-secrets
  namespace: isp-billing
  labels:
    app: isp-billing-backend
    managed-by: manual
type: Opaque
stringData:
  # ── Database ──
  # PostgreSQL async connection string for FastAPI/SQLAlchemy
  # Format: postgresql+asyncpg://<user>:<password>@<host>:<port>/<dbname>
  # The create-service-database.sh script creates the DB and user automatically.
  postgresUrl: "postgresql+asyncpg://isp_billing_user:CHANGE_ME@postgresql.infra.svc.cluster.local:5432/isp_billing"
  DATABASE_URL: "postgresql+asyncpg://isp_billing_user:CHANGE_ME@postgresql.infra.svc.cluster.local:5432/isp_billing"
  DATABASE_HOST: "postgresql.infra.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "isp_billing"
  DATABASE_USER: "isp_billing_user"
  DATABASE_PASSWORD: "CHANGE_ME"

  # ── Redis ──
  REDIS_URL: "redis://:CHANGE_ME@redis-master.infra.svc.cluster.local:6379/0"
  REDIS_HOST: "redis-master.infra.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "CHANGE_ME"

  # ── Celery (uses Redis as broker) ──
  CELERY_BROKER_URL: "redis://:CHANGE_ME@redis-master.infra.svc.cluster.local:6379/1"
  CELERY_RESULT_BACKEND: "redis://:CHANGE_ME@redis-master.infra.svc.cluster.local:6379/2"

  # ── JWT / Security ──
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(64))"
  SECRET_KEY: "CHANGE_ME_GENERATE_A_SECURE_64_CHAR_SECRET_KEY"
  ENCRYPTION_KEY: "CHANGE_ME_GENERATE_A_SECURE_ENCRYPTION_KEY"
  MASTER_PASSWORD: "CHANGE_ME_MASTER_ADMIN_PASSWORD"

  # ── M-PESA Integration ──
  MPESA_CONSUMER_KEY: "CHANGE_ME"
  MPESA_CONSUMER_SECRET: "CHANGE_ME"
  MPESA_PASSKEY: "CHANGE_ME"
  MPESA_SHORTCODE: "CHANGE_ME"

  # ── SMS — AfricasTalking ──
  SMS_PROVIDER: "africas_talking"
  AFRICASTALKING_API_KEY: "CHANGE_ME"
  AFRICASTALKING_USERNAME: "CHANGE_ME"

  # ── SMS — Twilio (optional, set SMS_PROVIDER=twilio to use) ──
  # TWILIO_ACCOUNT_SID: "CHANGE_ME"
  # TWILIO_AUTH_TOKEN: "CHANGE_ME"
  # TWILIO_PHONE_NUMBER: "CHANGE_ME"

  # ── Email — SMTP ──
  EMAIL_PROVIDER: "smtp"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "CHANGE_ME@gmail.com"
  SMTP_PASSWORD: "CHANGE_ME_APP_PASSWORD"

  # ── Email — SendGrid (optional, set EMAIL_PROVIDER=sendgrid to use) ──
  # SENDGRID_API_KEY: "CHANGE_ME"

  # ── MikroTik RouterOS ──
  MIKROTIK_DEFAULT_USERNAME: "admin"
  MIKROTIK_DEFAULT_PASSWORD: "CHANGE_ME"

  # ── Monitoring ──
  SENTRY_DSN: ""

---
# =============================================================================
# Frontend Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: isp-billing-frontend-secrets
  namespace: isp-billing
  labels:
    app: isp-billing-frontend
    managed-by: manual
type: Opaque
stringData:
  # ── NextAuth ──
  # Generate with: openssl rand -base64 32
  NEXTAUTH_SECRET: "CHANGE_ME_GENERATE_A_32_CHAR_SECRET"

  # ── Monitoring (optional) ──
  NEXT_PUBLIC_SENTRY_DSN: ""
