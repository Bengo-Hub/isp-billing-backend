name: Build and Deploy ISP Billing Backend

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggers

# NOTE: Deployment secrets (REGISTRY_*, KUBE_CONFIG, GIT_TOKEN, POSTGRES_PASSWORD,
# REDIS_PASSWORD, RABBITMQ_PASSWORD) are set at the Bengo-Hub ORGANIZATION level.
# Do NOT create repo-level secrets with the same names — they override org secrets
# and have historically been corrupted by sync workflows.

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install DevOps Tools
        uses: Bengo-Hub/devops-k8s/.github/actions/install-devops-tools@main

      - name: Set deployment variables
        run: |
          echo "DEPLOY=true" >> $GITHUB_ENV
          echo "SETUP_DATABASES=true" >> $GITHUB_ENV
          echo "DB_TYPES=postgres,redis" >> $GITHUB_ENV
          echo "NAMESPACE=isp-billing" >> $GITHUB_ENV
          echo "ENV_SECRET_NAME=isp-billing-backend-secrets" >> $GITHUB_ENV
          echo "REGISTRY_SERVER=docker.io" >> $GITHUB_ENV
          echo "REGISTRY_NAMESPACE=codevertex" >> $GITHUB_ENV
          echo "VALUES_FILE_PATH=apps/isp-billing-backend/values.yaml" >> $GITHUB_ENV
          echo "APP_NAME=isp-billing-backend" >> $GITHUB_ENV
          echo "SERVICE_DB_NAME=isp_billing" >> $GITHUB_ENV
          echo "SERVICE_DB_USER=isp_billing_user" >> $GITHUB_ENV

      - name: Verify secrets
        run: |
          echo "Verifying deployment secrets (from org-level)..."
          FAIL=0

          check_secret() {
            local name="$1" min_len="$2" value="$3"
            if [[ -z "$value" ]]; then
              echo "❌ $name is empty/missing"
              FAIL=1
            elif [[ ${#value} -lt $min_len ]]; then
              echo "⚠️  $name too short (${#value} chars, min $min_len)"
              FAIL=1
            else
              echo "✅ $name (${#value} chars)"
            fi
          }

          check_secret "REGISTRY_USERNAME"  5    "$REGISTRY_USERNAME"
          check_secret "REGISTRY_PASSWORD"  20   "$REGISTRY_PASSWORD"
          check_secret "KUBE_CONFIG"        1000 "$KUBE_CONFIG"
          check_secret "GIT_TOKEN"          20   "$GIT_TOKEN"
          check_secret "POSTGRES_PASSWORD"  8    "$POSTGRES_PASSWORD"
          check_secret "REDIS_PASSWORD"     8    "$REDIS_PASSWORD"

          if [[ $FAIL -eq 1 ]]; then
            echo ""
            echo "❌ Secret verification failed!"
            echo ""
            echo "These secrets come from Bengo-Hub ORGANIZATION-level secrets."
            echo "Org secrets are automatically available — no sync needed."
            echo ""
            echo "If repo-level secrets exist with the same name, they OVERRIDE"
            echo "org secrets and may contain corrupted values."
            echo ""
            echo "Fix: Delete any repo-level overrides so org values are used:"
            echo "  gh secret delete REGISTRY_USERNAME --repo ${{ github.repository }}"
            echo "  gh secret delete REGISTRY_PASSWORD --repo ${{ github.repository }}"
            echo "  gh secret delete KUBE_CONFIG --repo ${{ github.repository }}"
            echo "  gh secret delete GIT_TOKEN --repo ${{ github.repository }}"
            echo "  gh secret delete POSTGRES_PASSWORD --repo ${{ github.repository }}"
            echo "  gh secret delete REDIS_PASSWORD --repo ${{ github.repository }}"
            echo ""
            echo "Then re-run this workflow."
            exit 1
          fi

          echo ""
          echo "✅ All secrets verified"
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      - name: Run production deployment
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_EMAIL: ${{ secrets.REGISTRY_EMAIL }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GIT_SECRET: ${{ secrets.GIT_SECRET }}
          GITHUB_SHA: ${{ github.sha }}
          DEPLOY: true
          SETUP_DATABASES: true
          DB_TYPES: postgres,redis
          NAMESPACE: isp-billing
          ENV_SECRET_NAME: isp-billing-backend-secrets
          REGISTRY_SERVER: docker.io
          REGISTRY_NAMESPACE: codevertex
          VALUES_FILE_PATH: apps/isp-billing-backend/values.yaml
          APP_NAME: isp-billing-backend
          SERVICE_DB_NAME: isp_billing
          SERVICE_DB_USER: isp_billing_user
          GIT_USER: ${{ secrets.GIT_USER || 'ISPBilling Bot' }}
          GIT_EMAIL: ${{ secrets.GIT_EMAIL || 'dev@bengobox.com' }}
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Tag and push :latest
        if: success()
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_EMAIL: ${{ secrets.REGISTRY_EMAIL }}
          REGISTRY_SERVER: docker.io
          REGISTRY_NAMESPACE: codevertex
        run: |
          set -e
          IMAGE_REPO="${REGISTRY_SERVER}/${REGISTRY_NAMESPACE}/isp-billing-backend"
          SHORT_SHA=${GITHUB_SHA::8}
          echo "[DEBUG] REGISTRY_USERNAME: ${REGISTRY_USERNAME:-<not set>}"
          echo "[DEBUG] REGISTRY_PASSWORD length: ${#REGISTRY_PASSWORD} chars"
          echo "Tagging ${IMAGE_REPO}:${SHORT_SHA} as :latest"
          echo "Logging in to Docker registry..."
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_SERVER" -u "$REGISTRY_USERNAME" --password-stdin
          docker pull "${IMAGE_REPO}:${SHORT_SHA}" || true
          docker tag "${IMAGE_REPO}:${SHORT_SHA}" "${IMAGE_REPO}:latest"
          docker push "${IMAGE_REPO}:latest"

      - name: Check ArgoCD Application status
        if: success()
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
          NS: isp-billing
          APP_NAME: isp-billing-backend
        run: |
          if [ -z "${KUBE_CONFIG_B64}" ]; then
            echo "⏭️ Skipping ArgoCD check - no KUBE_CONFIG available"
            exit 0
          fi

          echo "::group::ArgoCD Application Status"
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config

          if kubectl get application ${APP_NAME} -n argocd >/dev/null 2>&1; then
            echo "✓ ArgoCD Application '${APP_NAME}' found"
            kubectl patch application ${APP_NAME} -n argocd --type merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' || true
            SYNC_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "Current Status - Sync: ${SYNC_STATUS}, Health: ${HEALTH_STATUS}"
          else
            echo "⚠️ ArgoCD Application '${APP_NAME}' not found"
            echo "Trigger provisioning: gh workflow run provision.yml --repo Bengo-Hub/devops-k8s"
          fi
          echo "::endgroup::"

      - name: Verify API health
        if: success()
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
          NS: isp-billing
        run: |
          if [ -z "${KUBE_CONFIG_B64}" ]; then
            echo "⏭️ Skipping health check - no KUBE_CONFIG available"
            exit 0
          fi

          echo "::group::Health check"
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config

          if kubectl get deployment isp-billing-backend -n ${NS} >/dev/null 2>&1; then
            kubectl rollout status deployment/isp-billing-backend -n ${NS} --timeout=1200s
            HOSTS=$(kubectl get ingress -n ${NS} -o jsonpath='{.items[*].spec.rules[*].host}' | tr ' ' '\n' | grep -E 'isp.*billing|wifi.*billing' || true)
            if [ -n "$HOSTS" ]; then
              for H in $HOSTS; do
                echo "Checking https://$H/healthz ..."
                if curl -sk --max-time 10 "https://$H/healthz" | grep -qi "ok\|healthy"; then
                  echo "✅ Health OK for $H"
                  break
                fi
              done
            else
              echo "No ingress host found; skipping external health probe"
            fi
          else
            echo "Deployment not found yet - ArgoCD may still be syncing"
          fi
          echo "::endgroup::"
