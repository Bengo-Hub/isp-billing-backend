<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="1; url=$(link-redirect)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Successful</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .success-icon {
            width: 60px;
            height: 60px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        .checkmark {
            width: 30px;
            height: 30px;
            border: 3px solid white;
            border-top: none;
            border-right: none;
            transform: rotate(-45deg);
            margin-top: 10px;
        }
        h1 {
            color: #10b981;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin-bottom: 1rem;
        }
        .info {
            background: #f0f9ff;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #667eea;
            margin-top: 1.5rem;
        }
        .info p {
            margin: 0.25rem 0;
            font-size: 0.875rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <div class="checkmark"></div>
        </div>
        <h1>Login Successful!</h1>
        <p>You are now connected to the internet.</p>
        <p>Redirecting you shortly...</p>
        $(if refresh-timeout)
        <div class="info">
            <p><strong>Session Information:</strong></p>
            <p>Username: <strong>$(username)</strong></p>
            <p>Refresh: $(refresh-timeout)</p>
        </div>
        $(endif)
    </div>
    <script>
        // JavaScript redirect as fallback
        setTimeout(function() {
            window.location.href = '$(link-redirect)';
        }, 1000);
    </script>
</body>
</html>
