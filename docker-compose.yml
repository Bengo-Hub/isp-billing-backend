version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ispbilling-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ispbilling
    volumes:
      - ispbilling_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"  # Using 5434 to avoid conflict with existing postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ispbilling"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: ispbilling-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ispbilling_redis_data:/data
    ports:
      - "6381:6379"  # Using 6381 to avoid conflict with existing redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ispbilling_postgres_data:
  ispbilling_redis_data:
