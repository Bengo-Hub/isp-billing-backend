version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ispbilling_postgres
    environment:
      POSTGRES_DB: ispbilling
      POSTGRES_USER: ispbilling
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ispbilling_network
    restart: unless-stopped

  # Redis Cache and Queue
  redis:
    image: redis:7-alpine
    container_name: ispbilling_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ispbilling_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: ispbilling_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ispbilling
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=your-super-secret-key-change-in-production
      - DEBUG=true
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/venv
    depends_on:
      - postgres
      - redis
    networks:
      - ispbilling_network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: ispbilling_celery_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://ispbilling:postgres@postgres:5432/ispbilling
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=your-super-secret-key-change-in-production
      - DEBUG=true
      - ENVIRONMENT=development
    volumes:
      - .:/app
      - /app/venv
    depends_on:
      - postgres
      - redis
    networks:
      - ispbilling_network
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: ispbilling_celery_beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://ispbilling:postgres@postgres:5432/ispbilling
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=your-super-secret-key-change-in-production
      - DEBUG=true
      - ENVIRONMENT=development
    volumes:
      - .:/app
      - /app/venv
    depends_on:
      - postgres
      - redis
    networks:
      - ispbilling_network
    restart: unless-stopped
    command: celery -A app.tasks beat --loglevel=info

  # Flower (Celery Monitoring)
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: ispbilling_flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - ispbilling_network
    restart: unless-stopped
    command: celery -A app.tasks flower --port=5555

volumes:
  postgres_data:
  redis_data:

networks:
  ispbilling_network:
    driver: bridge
