<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=$(redirect-url)?mac=$(mac)&ip=$(ip)&username=$(username)&link-orig=$(link-orig-esc)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Portal...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin-bottom: 1.5rem;
        }
        a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting to Portal</h1>
        <p>Please wait while we redirect you portal...</p>
        <p>If not redirected automatically, <a href="$(redirect-url)?mac=$(mac)&ip=$(ip)&username=$(username)&link-orig=$(link-orig-esc)">click here</a></p>
    </div>
    <script>
        // Fallback redirect after 3 seconds if meta refresh fails
        setTimeout(function() {
            window.location.href = '$(redirect-url)?mac=$(mac)&ip=$(ip)&username=$(username)&link-orig=$(link-orig-esc)';
        }, 3000);
    </script>
</body>
</html>
