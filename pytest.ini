[tool:pytest]
# Pytest configuration for ISP Billing System tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests
    mpesa: MPESA integration tests
    slow: Slow running tests
    requires_db: Tests that require database
    requires_redis: Tests that require Redis
    requires_mpesa: Tests that require MPESA API

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# Test environment
env = 
    TESTING = true
    DATABASE_URL = postgresql+asyncpg://postgres:postgres@localhost:5432/ispbilling_test
    REDIS_URL = redis://localhost:6379/1
    MPESA_ENVIRONMENT = sandbox
    MPESA_CONSUMER_KEY = test_key
    MPESA_CONSUMER_SECRET = test_secret
    MPESA_PASSKEY = test_passkey
    MPESA_SHORTCODE = 123456
    MPESA_CALLBACK_URL = https://example.com/callback

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if using pytest-cov)
[coverage:run]
source = app
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*
    */alembic/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
